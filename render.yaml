services:
  # ── Web Service (PHP/Laravel) ──────────────────────────────────────────────
  - type: web
    name: smart-travel-app
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm ci
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache
      chmod -R 775 storage bootstrap/cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: Smart Travel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          name: smart-travel-app
          type: web
          property: host
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: smart-travel-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smart-travel-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: smart-travel-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: smart-travel-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smart-travel-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: BROADCAST_CONNECTION
        value: log
      - key: LOG_CHANNEL
        value: stderr

  # ── Database MySQL ─────────────────────────────────────────────────────────
databases:
  - name: smart-travel-db
    plan: free
    databaseName: smart_travel
